<!DOCTYPE html>
<head>
    <title>Number Guessing Game</title>
    
    <style>
    html {
    font-family: sans-serif;
    }
    
    body {
    background-image: linear-gradient(rgb(98, 0, 255),rgb(0, 174, 255));
    }
    </style>
</head>
 
<body>
<h1>Guess The Number</h1>
 
<p>We have selected a random number between 1 - 1,000.
See if you can guess it.</p>
 
<div class="form">
<label for="guessField">Enter a guess: </label>
<input type="text" id="guessField" class="guessField">
<input type="submit" value="Submit guess" class="guessSubmit" id="submitguess">
</div>
           
<script type="text/javascript">

//1.  add the script tag that will tell the browser we are going to use Javascript.
 
 
// 2. Create a variable named y and assign the following value:  Math.floor(Math.random() * 10 + 1)
 var y = Math.floor(Math.random() * 1000 + 1);
 
// 3. create one more vairable that will keep track of the number of guesses. Name it guess and set the value to 1.
var guess = 1;
 
//4. add the following line of code:
 
document.getElementById("submitguess").onclick = function () {
    var x = document.getElementById("guessField").value;

    if(x == y)
    {
        alert("Good boy. Took you " + guess + " guess(es). -_- ");
    }
    else if(x>y){
        alert("Bad boy. Use a smaller number. ( ｡ •̀ ᴖ •́ ｡)💢");    
    }
    else if(x<y){
        alert("Bad boy. Use a bigger number. ( ｡ •̀ ᴖ •́ ｡)💢");    
    }

    guess++;
   
}
// 5. Create one more variable that will hold the number guessed by user
 
//6. Using conditional statements and the lines of code bellow create the logic to check if the user guessed correctly:
 

//7. Close the script tag.
 </script>
 
 
</body></html>

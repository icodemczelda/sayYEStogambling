<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="./styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

</head>
<body>
    <!--Semantic Code = Useless code for us to undestand better. eX: USING DIVS TO CLASSIFY CODE, DIVS ARENT VISIBLE--> 
        <h1> Rock, Paper, Scissors! </h1>
  <table>
    <tr style="color:white;"><th style ="width:150px;"><h2>You</h2></th><th style="width:450px;"></th><th style ="width:150px;"><h2 id="userb">Computer</h2></th></tr>
    </table>
    <table>
    <tr><th style ="width:150px;">
        <div class= "controls-a">
            <div class="options">
                <button class="choice-btn" data-choice="rock"><img src="images/rock.png" alt = "fart" width="100px" style="filter: invert()">Rock</button>
                <button class="choice-btn" data-choice="paper"><img src="images/paper.png" alt = "fart" width="100px" style="filter: invert()">Paper</button>
                <button class="choice-btn" data-choice="scissors"><img src="images/scissors.png" alt = "fart" width="100px" style="filter: invert()">Scissors</button>
            </div>
        </div>
     </th>
     <th style ="width:650px;">
        <div class="game-container">
               <div class="scoreboard">
            <div class="score">
                <span id="player-score">0</span>
                <span id="computer-score">0</span>
            </div>
       <div class="match">
            <div class="hand" id="player-hand">
                <img src="images/question.png" alt = "fart" width="100px">
            </div>
            <div class="hand" id="computer-hand">
                <img src="images/question.png"  width="300px">
            </div>
        </div>

        <div class="result">
            <p>Choose rock, paper, or scissors.</p>
        </div>

     
        </div>
    </th>
    <th style ="width:150px;">
<div class= "controls-b">
         <div class="computerOptions">
                <button class="choice-btn" data-choice="rock" disabled><img src="images/rock.png" alt = "fart" width="100px" style="filter: invert()">Rock</button>
                <button class="choice-btn" data-choice="paper"><img src="images/paper.png" alt = "fart" width="100px" style="filter: invert()">Paper</button>
                <button class="choice-btn" data-choice="scissors"><img src="images/scissors.png" alt = "fart" width="100px" style="filter: invert()">Scissors</button>
        </div>
         </div>
     </th></tr> </table>


        

       
    </div>

    <script src="./script.js"></script>

</body>
</html>
